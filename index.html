<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StorePulse — July Closing Window</title>
<style>
:root{
  --navy:#082f49; --blue:#0ea5e9; --blue2:#2563eb; --sky:#e0f2fe;
  --green:#15803d; --green2:#22c55e; --green-bg:#dcfce7;
  --amber:#a16207; --amber-bg:#fef3c7; --red:#b91c1c; --red-bg:#fee2e2;
  --ink:#172033; --muted:#64748b; --line:#dbe4ee; --panel:#fff; --page:#f3f7fb;
  --yellow:#fff4bf; --purple:#7c3aed; --teal:#0f766e; --orange:#c2410c;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:Inter,Arial,Helvetica,sans-serif;background:var(--page);color:var(--ink)}
button,input,select{font:inherit}
.topbar{position:sticky;top:0;z-index:50;background:linear-gradient(90deg,var(--navy),#0c4a6e);color:#fff;padding:13px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 3px 16px #082f4930}
.brand{font-weight:900;font-size:21px;white-space:nowrap}
.tabs{display:flex;gap:7px;overflow:auto;flex:1;padding:2px}
.tab{border:0;background:#ffffff17;color:#fff;padding:9px 12px;border-radius:10px;font-weight:800;white-space:nowrap;cursor:pointer}
.tab:hover{background:#ffffff2b}.tab.active{background:#fff;color:var(--navy)}
.actions{display:flex;gap:7px}
.btn{border:1px solid #ffffff45;background:#ffffff16;color:#fff;padding:9px 11px;border-radius:9px;font-weight:800;cursor:pointer;white-space:nowrap}
.btn.light{background:#fff;color:var(--navy)} .btn.dark{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn.secondary{background:#fff;color:var(--navy);border-color:var(--line)}
.content{max-width:1500px;margin:auto;padding:18px}
.page{display:none}.page.active{display:block}
.hero,.rep-banner{border-radius:20px;padding:22px;color:#fff;margin-bottom:16px;box-shadow:0 12px 32px #0b2e4f20}
.hero{background:linear-gradient(135deg,var(--navy),#075985)}
.hero h1,.rep-banner h1{margin:0 0 6px;font-size:28px}.hero p,.rep-banner p{margin:0;color:#e6f5ff}
.rep-banner{display:flex;align-items:center;justify-content:space-between;gap:18px;transition:box-shadow .3s,transform .3s}
.grid{display:grid;gap:14px}.grid.kpis{grid-template-columns:repeat(5,minmax(0,1fr))}
.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
.grid.four{grid-template-columns:repeat(4,minmax(0,1fr))}
.card{background:var(--panel);border:1px solid var(--line);border-radius:17px;box-shadow:0 6px 20px #0f29400d;overflow:hidden}
.card-head{padding:12px 14px;background:var(--sky);font-weight:900;color:var(--navy);border-bottom:1px solid var(--line)}
.card-body{padding:14px}.kpi{text-align:center;padding:16px}.kpi .label{font-size:12px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.kpi .value{font-size:28px;font-weight:950;margin-top:5px;color:var(--navy)}.kpi .sub{font-size:12px;color:var(--muted);margin-top:4px}
.section-title{font-size:18px;font-weight:950;color:var(--navy);margin:21px 0 10px}
table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid var(--line);padding:10px 9px;text-align:left;vertical-align:top}
th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;background:#f8fafc}.num{text-align:right}tr:last-child td{border-bottom:0}
.status{display:inline-block;border-radius:999px;padding:5px 9px;font-size:11px;font-weight:950;white-space:nowrap}
.roll,.activeBonus{background:var(--green-bg);color:var(--green)}.course{background:var(--sky);color:var(--blue2)}
.momentum{background:var(--amber-bg);color:var(--amber)}.seek,.risk{background:var(--red-bg);color:var(--red)}
.callout{border-radius:15px;padding:14px;border:1px solid var(--line);line-height:1.48}.callout.win{background:var(--green-bg);border-color:#a7dbb5;color:#245d28}
.callout.focus{background:var(--red-bg);border-color:#efb9b9;color:#7f1d1d}.callout.note{background:var(--amber-bg);border-color:#ead292;color:#6e4a00}
.hp-wrap{min-width:270px}.hp-shell{height:31px;background:#d8dee6;border:3px solid #26313b;border-radius:5px;overflow:hidden;position:relative;box-shadow:inset 0 0 0 1px #fff9,0 2px 5px #0003}
.hp-fill{height:100%;width:100%;transition:width 3.6s cubic-bezier(.12,.78,.18,1),background .6s;transform-origin:left}
.hp-text{position:absolute;inset:0;display:grid;place-items:center;font-weight:950;color:#101820;text-shadow:0 1px #fff}
.hp-hit{animation:hitShake .55s ease 2.9s both}.qualified-glow{animation:qualifiedGlow 1.7s ease both}
@keyframes hitShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(2px)}}
@keyframes qualifiedGlow{0%{box-shadow:0 12px 32px #0b2e4f20}30%{box-shadow:0 0 0 5px #86efac,0 0 38px 14px #22c55eaa;transform:scale(1.01)}100%{box-shadow:0 12px 32px #0b2e4f20;transform:scale(1)}}
.money-animate{font-variant-numeric:tabular-nums}
.badges{display:flex;flex-wrap:wrap;gap:8px}.badge{border-radius:999px;padding:7px 10px;background:#eef5fb;border:1px solid #cce0f1;color:var(--navy);font-size:12px;font-weight:850}
.form-grid{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:12px}.field{display:flex;flex-direction:column;gap:5px}.field label{font-size:12px;font-weight:850;color:var(--muted)}
.field input,.field select{width:100%;border:1px solid #c8d3de;border-radius:9px;padding:10px;background:var(--yellow);color:var(--ink)}.field input:focus{outline:3px solid #0ea5e933;border-color:var(--blue)}
.edit-section{margin-bottom:18px}.edit-section h3{margin:0 0 10px;color:var(--navy)}
details{background:#fff;border:1px solid var(--line);border-radius:13px;margin:10px 0}summary{cursor:pointer;padding:13px 14px;font-weight:900;color:var(--navy)}
.detail-body{padding:0 14px 14px}code.formula{display:block;background:#0f172a;color:#e2e8f0;border-radius:9px;padding:10px;white-space:normal;line-height:1.45}
.mini{font-size:12px;color:var(--muted)}.positive{color:var(--green);font-weight:850}.negative{color:var(--red);font-weight:850}.neutral{color:var(--muted);font-weight:850}
.screen-only{display:block}.footer-note{text-align:center;color:var(--muted);font-size:12px;margin:22px 0}
@media(max-width:1100px){.grid.kpis{grid-template-columns:repeat(3,1fr)}.grid.four{grid-template-columns:repeat(2,1fr)}.form-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:720px){.topbar{flex-wrap:wrap;align-items:flex-start}.tabs{order:3;width:100%}.actions{margin-left:auto}.content{padding:10px}.grid.kpis,.grid.two,.grid.three,.grid.four{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}.rep-banner{align-items:flex-start;flex-direction:column}.hp-wrap{width:100%;min-width:0}.hero h1,.rep-banner h1{font-size:23px}th:nth-child(4),td:nth-child(4){display:none}}
@media print{body{background:#fff}.topbar,.screen-only{display:none!important}.content{max-width:none;padding:0}.page{display:none!important}.page.active{display:block!important}.card,.hero,.rep-banner{box-shadow:none;break-inside:avoid}.hero,.rep-banner,.hp-fill{-webkit-print-color-adjust:exact;print-color-adjust:exact}}

.huddle-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.rep-huddle{display:grid;grid-template-columns:150px 1fr 1fr;gap:12px;padding:13px 14px;border-bottom:1px solid var(--line);align-items:start}
.rep-huddle:last-child{border-bottom:0}
.rep-huddle .name{font-weight:950;color:var(--navy)}
.sample{display:inline-block;margin-top:4px;border-radius:999px;padding:3px 7px;font-size:10px;font-weight:900;background:#eef2f7;color:#475569}
.share-mode .manager-only{display:none!important}
.share-mode .screen-only-edit{display:none!important}
.share-mode .content{max-width:1200px}
.share-banner{display:none}
.share-mode .share-banner{display:block;background:var(--navy);color:#fff;padding:10px 14px;border-radius:12px;margin-bottom:12px;font-weight:800}
.metric-gap{font-size:12px;color:var(--muted);margin-top:4px}
@media(max-width:720px){.huddle-grid{grid-template-columns:1fr}.rep-huddle{grid-template-columns:1fr}}


.vault-card{position:relative;min-height:132px;display:grid;place-items:center;background:linear-gradient(145deg,#0f172a,#1e293b);color:#fff;border:1px solid #334155;border-radius:16px;overflow:hidden}
.vault-card.unlocked{background:linear-gradient(145deg,#f8fff9,#e9f8ed);color:var(--ink);border-color:#9bd6aa}
.vault-door{display:grid;place-items:center;gap:8px;text-align:center;padding:18px;cursor:pointer;width:100%;height:100%}
.vault-door .icon{font-size:34px}.vault-door .lock-title{font-weight:950;font-size:15px}.vault-door .lock-sub{font-size:12px;color:#cbd5e1}
.vault-content{display:none;width:100%;padding:14px}.vault-card.unlocked .vault-door{display:none}.vault-card.unlocked .vault-content{display:block}
.vault-open{animation:vaultOpen .7s ease both}@keyframes vaultOpen{0%{transform:scale(.94);filter:brightness(.75)}55%{transform:scale(1.03);filter:brightness(1.2)}100%{transform:scale(1);filter:none}}
.vault-hide{border:0;background:transparent;color:var(--muted);font-weight:800;cursor:pointer;font-size:12px;margin-top:8px}
.modal-backdrop{position:fixed;inset:0;background:#020617aa;display:none;align-items:center;justify-content:center;z-index:200;padding:18px}.modal-backdrop.show{display:flex}
.modal{width:min(420px,100%);background:#fff;border-radius:18px;box-shadow:0 25px 80px #0008;overflow:hidden}.modal-head{background:linear-gradient(90deg,var(--navy),#0c4a6e);color:#fff;padding:17px 18px;font-weight:950;font-size:18px}
.modal-body{padding:18px}.modal-body label{font-size:12px;font-weight:900;color:var(--muted);display:block;margin-bottom:6px}.modal-body input{width:100%;padding:12px;border:1px solid #cbd5e1;border-radius:10px;font-size:16px}
.modal-actions{display:flex;gap:9px;justify-content:flex-end;margin-top:14px}.modal-error{display:none;color:var(--red);font-weight:850;font-size:12px;margin-top:8px}.modal-error.show{display:block}


.quick-update-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-bottom:18px}
.quick-card{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden}
.quick-head{padding:12px 14px;background:linear-gradient(90deg,var(--navy),#0c4a6e);color:#fff;font-weight:950}
.quick-body{padding:14px}
.quick-body textarea{width:100%;min-height:265px;border:1px solid #cbd5e1;border-radius:10px;padding:12px;background:var(--yellow);font:600 14px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace;resize:vertical}
.quick-order{font-size:12px;line-height:1.55;color:var(--muted);background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:10px;margin:10px 0}
.quick-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.quick-success{display:none;color:var(--green);font-weight:900;font-size:12px}.quick-success.show{display:inline}
.advanced-editor summary{font-size:16px}
@media(max-width:800px){.quick-update-grid{grid-template-columns:1fr}}


.paid-priority{border-left:5px solid #16a34a;background:linear-gradient(90deg,#f0fdf4,#ffffff);border-radius:13px;padding:13px 14px;line-height:1.5}
.paid-priority strong{color:#166534}
.money-moves{display:grid;gap:9px}
.money-move{display:flex;gap:10px;align-items:flex-start;background:#f8fafc;border:1px solid var(--line);border-radius:11px;padding:10px 11px}
.money-move .coin{font-size:19px;line-height:1}
.rep-huddle .paid-line{margin-top:7px;padding-top:7px;border-top:1px dashed #cbd5e1;color:#166534;font-weight:800}


.money-toggle{margin-top:12px;border:0;background:linear-gradient(90deg,#14532d,#16a34a);color:#fff;padding:10px 14px;border-radius:999px;font-weight:900;cursor:pointer;box-shadow:0 6px 18px #16653433}
.money-toggle:hover{filter:brightness(1.05)}
.money-toggle-wrap{display:flex;justify-content:flex-start}
.money-drop-layer{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:180}
.money-drop{position:absolute;top:-60px;font-size:28px;animation:moneyFall linear forwards;filter:drop-shadow(0 4px 6px rgba(0,0,0,.25))}
@keyframes moneyFall{0%{transform:translateY(-80px) rotate(0deg);opacity:0}10%{opacity:1}100%{transform:translateY(120vh) rotate(360deg);opacity:.95}}
.money-hidden{display:none}


.urgency-strip{margin-top:15px;background:#fff3;border:1px solid #ffffff66;border-radius:14px;padding:12px 14px;backdrop-filter:blur(3px)}
.urgency-top{display:flex;justify-content:space-between;gap:12px;align-items:center;font-weight:950}
.urgency-days{font-size:22px;letter-spacing:.4px}.urgency-copy{font-size:12px;color:#e0f2fe;text-align:right}
.month-track{height:10px;background:#ffffff30;border-radius:999px;overflow:hidden;margin-top:9px;border:1px solid #ffffff40}
.month-fill{height:100%;background:linear-gradient(90deg,#facc15,#fb923c,#ef4444);border-radius:999px;box-shadow:0 0 14px #fb923c99}
.deadline-card{position:relative;overflow:hidden;border:2px solid #f59e0b;background:linear-gradient(145deg,#fffbeb,#fff7ed)}
.deadline-card:before{content:'';position:absolute;inset:0;background:linear-gradient(110deg,transparent 30%,#fff7 48%,transparent 66%);transform:translateX(-120%);animation:deadlineSweep 4.5s ease-in-out infinite}
.deadline-card .value{color:#b45309!important}.urgent-pulse{animation:urgentPulse 2.2s ease-in-out infinite}
@keyframes deadlineSweep{0%,55%{transform:translateX(-120%)}100%{transform:translateX(120%)}}
@keyframes urgentPulse{0%,100%{box-shadow:0 6px 20px #0f29400d}50%{box-shadow:0 0 0 4px #f59e0b22,0 8px 28px #f59e0b33}}
.closing-window{border-left:6px solid #f59e0b;background:linear-gradient(90deg,#fffbeb,#fff);padding:15px 16px;border-radius:15px;display:grid;grid-template-columns:auto 1fr;gap:13px;align-items:center}
.closing-window .clock{font-size:34px}.closing-window h3{margin:0 0 3px;color:#92400e}.closing-window p{margin:0;color:#78350f;line-height:1.45}
.runway-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:12px}
.runway-item{border:1px solid #fed7aa;background:#fff;border-radius:12px;padding:11px;text-align:center}.runway-item strong{display:block;font-size:20px;color:#9a3412}.runway-item span{font-size:11px;color:#7c2d12;font-weight:800;text-transform:uppercase}
.deadline-tag{display:inline-flex;align-items:center;gap:6px;background:#7f1d1d;color:#fff;border-radius:999px;padding:6px 10px;font-size:11px;font-weight:950;letter-spacing:.3px;margin-top:9px}
.rep-deadline{margin:0 0 14px;border:1px solid #fdba74;background:#fff7ed;border-radius:14px;padding:12px 14px;color:#7c2d12;font-weight:800;display:flex;justify-content:space-between;gap:12px;align-items:center}
.rep-deadline strong{color:#9a3412;font-size:17px}.pace-per-day{font-size:11px;color:#9a3412;font-weight:900;margin-top:5px}
@media(max-width:720px){.urgency-top,.rep-deadline{align-items:flex-start;flex-direction:column}.urgency-copy{text-align:left}.runway-grid{grid-template-columns:repeat(2,1fr)}}

</style>
</head>
<body>
<div class="topbar screen-only">
  <div class="brand">StorePulse</div>
  <div class="tabs" id="tabs"></div>
  <div class="actions">
    <button class="btn" onclick="window.print()">Print</button>
    <button class="btn light" onclick="shareCurrentPage()">Share</button>
  </div>
</div>
<main class="content" id="content"></main>

<div class="modal-backdrop" id="vaultModal" onclick="if(event.target===this)closeVaultModal()">
  <div class="modal">
    <div class="modal-head">🔐 Unlock Compensation Vault</div>
    <div class="modal-body">
      <label id="vaultLabel">Password</label>
      <input id="vaultPassword" type="password" autocomplete="off" onkeydown="if(event.key==='Enter')submitVaultPassword()" />
      <div class="modal-error" id="vaultError">Incorrect password.</div>
      <div class="modal-actions">
        <button class="btn secondary" onclick="closeVaultModal()">Cancel</button>
        <button class="btn dark" onclick="submitVaultPassword()">Unlock</button>
      </div>
    </div>
  </div>
</div>

<div class="money-drop-layer" id="moneyRain"></div>
<script>
const DEFAULT_STATE = {
 meta:{month:'July 2026',daysInMonth:31,daysElapsed:20,storeName:'Cinnaminson',updatedThrough:'EOD July 20'},
 comp:{startingBase:17.5,ppvMultiplier:1,aiaPostedMultiplier:1.6,upgradeAdd:.15,dataAdd:.30,aiaSubmitSpiff:10,pre2postSpiff:10,csatQual:.88,aiaSubmitQual:4,htpQual:2,insuranceMin:.50,accMin:50,insuranceBonus:.60,accBonus:60,aiaCloseQual:.075},
 storeGoals:{traffic:779,ppv:38,aiaPosted:19,upgrades:60,data:12,managerAtRisk:612,manager60s:306},
 repGoals:{ppv:10,aiaPosted:5,aiaSubmits:4,upgrades:15,data:3,htp:2,pre2post:2,tradeRate:.50,insurance:.60,accPerOpp:60,csat:.88,aiaClose:.065,htpRate:.05,nextUp:.60},
 store:{traffic:567,ppv:16,ppvClose:.0265,aiaPosted:8,aiaSubmits:8,aiaClose:.049,htp:2,htpEligible:55,htpClose:.0367,upgrades:46,data:11,cru:1,accessoryRevenue:3657,accPerOpp:59.95,insurance:.6522,nextUp:.2364,csat:1,pre2post:1,pa4:0,oppCount:0,tradeRate:.528},
 reps:[
  {name:'Noelle',color:'#6a4c93',ppv:5,aiaPosted:1,aiaSubmits:1,aiaClose:.024,htp:1,htpEligible:0,upgrades:11,data:0,cru:0,accessoryRevenue:1085,accPerOpp:67.80,insurance:1,nextUp:.2667,csat:1,pre2post:0,pa4:0,oppCount:0,tradeRate:0,ple:true},
  {name:'Derick',color:'#0f8b8d',ppv:3,aiaPosted:2,aiaSubmits:2,aiaClose:.063,htp:0,htpEligible:0,upgrades:9,data:2,cru:1,accessoryRevenue:387,accPerOpp:32.21,insurance:.2222,nextUp:.30,csat:1,pre2post:0,pa4:0,oppCount:0,tradeRate:0,ple:true},
  {name:'Jamie',color:'#d97706',ppv:4,aiaPosted:3,aiaSubmits:4,aiaClose:.095,htp:1,htpEligible:0,upgrades:16,data:8,cru:0,accessoryRevenue:1578,accPerOpp:82.63,insurance:.7363,nextUp:.2941,csat:1,pre2post:1,pa4:0,oppCount:0,tradeRate:0,ple:true},
  {name:'TJ',color:'#1473e6',ppv:4,aiaPosted:2,aiaSubmits:1,aiaClose:.025,htp:0,htpEligible:0,upgrades:7,data:1,cru:0,accessoryRevenue:431,accPerOpp:39.18,insurance:.5556,nextUp:0,csat:1,pre2post:0,pa4:0,oppCount:0,tradeRate:0,ple:true}
 ],
 previous:null
};
const EMBEDDED_STATE = null;
let state=loadState(), currentPage='store';

const VAULT_PASSWORDS={manager:'WM8K3',reps:['Glenn','Hook','McGloan','Schreiner']};
const unlockedVaults={manager:false,reps:[false,false,false,false],comp:[false,false,false,false]};
let pendingVault=null;
function openVaultModal(type,index=null){
 pendingVault={type,index};
 document.getElementById('vaultLabel').textContent=type==='manager'?'Manager Compensation Password':`${state.reps[index].name} Compensation Password`;
 const input=document.getElementById('vaultPassword');input.value='';
 document.getElementById('vaultError').classList.remove('show');
 document.getElementById('vaultModal').classList.add('show');setTimeout(()=>input.focus(),60);
}
function closeVaultModal(){document.getElementById('vaultModal').classList.remove('show');pendingVault=null}
function submitVaultPassword(){
 if(!pendingVault)return;
 const entered=document.getElementById('vaultPassword').value;
 const expected=pendingVault.type==='manager'?VAULT_PASSWORDS.manager:VAULT_PASSWORDS.reps[pendingVault.index];
 if(entered!==expected){document.getElementById('vaultError').classList.add('show');document.getElementById('vaultPassword').select();return}
 if(pendingVault.type==='manager')unlockedVaults.manager=true;
 else unlockedVaults[pendingVault.type][pendingVault.index]=true;
 const id=pendingVault.type==='manager'?'vault-manager':`vault-${pendingVault.type}-${pendingVault.index}`;
 closeVaultModal();renderAll();setTimeout(()=>{const el=document.getElementById(id);if(el){el.classList.add('vault-open');setTimeout(()=>el.classList.remove('vault-open'),800)}animateActivePage()},50);
}
function hideVault(type,index=null){if(type==='manager')unlockedVaults.manager=false;else unlockedVaults[type][index]=false;renderAll()}
function managerVault(content){
 if(unlockedVaults.manager)return `<div class="vault-card unlocked" id="vault-manager"><div class="vault-content">${content}<button class="vault-hide" onclick="hideVault('manager')">🔒 Hide compensation</button></div></div>`;
 return `<div class="vault-card" id="vault-manager"><div class="vault-door" onclick="openVaultModal('manager')"><div class="icon">🔒</div><div class="lock-title">Manager Compensation Vault</div><div class="lock-sub">Tap to unlock</div></div></div>`;
}
function repVault(index,content){
 if(unlockedVaults.reps[index])return `<div class="vault-card unlocked" id="vault-rep-${index}"><div class="vault-content">${content}<button class="vault-hide" onclick="hideVault('reps',${index})">🔒 Hide compensation</button></div></div>`;
 return `<div class="vault-card" id="vault-rep-${index}"><div class="vault-door" onclick="openVaultModal('reps',${index})"><div class="icon">🔒</div><div class="lock-title">Projected Commission Vault</div><div class="lock-sub">Tap to unlock</div></div></div>`;
}
function compVault(index,content){

function coachStatus(projectedValue,goal,isRate=false){

function trend(path,current){
 const prev=state.previous?.[path.split('.')[0]]; if(!prev)return ['No prior snapshot','neutral'];
 let old=prev; for(const p of path.split('.').slice(1))old=old?.[p];
 if(old===undefined||old===null)return ['No prior snapshot','neutral'];
 const d=n(current)-n(old); if(Math.abs(d)<.000001)return ['No change','neutral'];
 const rateKeys=['insurance','accPerOpp','aiaClose','nextUp','csat','tradeRate'];
 const key=path.split('.').at(-1), text=rateKeys.includes(key)?`${d>0?'▲':'▼'} ${key==='accPerOpp'?money2(Math.abs(d)):pct(Math.abs(d))}`:`${d>0?'▲':'▼'} ${Math.abs(d)}`;
 return [text,d>0?'positive':'negative'];
}

function paidMovesForRep(rep){
 const moves=[];
 const ppvGoal=adjustedRepGoal('ppv');
 const aiaGoal=n(state.repGoals.aiaPosted);
 const ppvNeed=unitsNeededForPace(rep.ppv,ppvGoal);

 const aiaSubmitNeed=Math.max(0,n(state.comp.aiaSubmitQual)-n(rep.aiaSubmits));
 const htpNeed=Math.max(0,n(state.comp.htpQual)-n(rep.htp));
 const notAiaQualified = !(n(rep.aiaSubmits)>=n(state.comp.aiaSubmitQual) || n(rep.aiaClose)>=n(state.comp.aiaCloseQual));

 if(notAiaQualified){
   if(rep.aiaClose>=state.comp.aiaCloseQual){
     moves.push(`AIA close rate already qualifies at ${pct(rep.aiaClose)}. Keep asking every customer and team-sell so posted AIA can turn into money.`);
   }else if(aiaSubmitNeed===1){
     moves.push('Only 1 more AIA submit gets you to qualification. Ask everyone and do not forget to team-sell live opportunities.');
   }else if(aiaSubmitNeed>1){
     moves.push(`Need ${aiaSubmitNeed} more AIA submits or a ${pct(state.comp.aiaCloseQual)} close rate. Ask everyone and team-sell live opportunities.`);
   }else{
     moves.push(`AIA needs attention until you qualify. Work toward ${state.comp.aiaSubmitQual} submits or a ${pct(state.comp.aiaCloseQual)} close rate.`);
   }
 } else {
   if(aiaPostedNeed===1){
     moves.push('Only 1 more AIA Posted puts you slightly ahead of pace. Ask everyone and team-sell live opportunities.');
   }else if(aiaPostedNeed>1){
     moves.push(`${aiaPostedNeed} more AIA Posted gets you back to pace. Ask every customer and team-sell live opportunities.`);
   }else{
     moves.push('AIA is qualified. Keep converting those conversations into posted AIA because that is where the money shows up.');
   }
 }

 if(ppvNeed===1){
   moves.push('One quality PPV puts you back on pace. Slow down, complete the account review, and find the right fit.');
 }else if(ppvNeed>1){
   moves.push(`${ppvNeed} quality PPVs gets you back to pace. Use every account review to uncover a fit.`);
 }

 if(htpNeed>0){
   moves.push(`Need ${htpNeed} more HTP to qualify. Ask every eligible household about protection.`);
 }

 if(rep.insurance<state.comp.insuranceMin){
   moves.push('Look for opportunities to add PA1 on every eligible sale to protect qualification.');
 }else if(rep.insurance<state.comp.insuranceBonus){
   moves.push(`Insurance qualifies, but you are ${((state.comp.insuranceBonus-rep.insurance)*100).toFixed(1)} points from the 1.25× multiplier. Offer PA1 on every eligible sale.`);
 }

 if(rep.accPerOpp<state.comp.accMin){
   moves.push(`Look for oppless accessory sales and complete solutions. You need ${money2(dollarsToThreshold(rep.accPerOpp,state.comp.accMin))} more per opportunity to qualify.`);
 }else if(rep.accPerOpp<state.comp.accBonus){
   moves.push(`Accessories qualify. Look for oppless accessory sales to gain ${money2(dollarsToThreshold(rep.accPerOpp,state.comp.accBonus))} per opportunity and activate the 1.25× multiplier.`);
 }

 if(!moves.length){
   moves.push('All major paid metrics are healthy. Keep asking, protect the multipliers, and create separation above pace.');
 }
 return moves;
}

function renderRep(rep,i){

  <div class="card kpi"><div class="label">Qualification</div><div class="value" style="font-size:18px;color:${q.qualified?'var(--green)':'var(--red)'}">${q.qualified?'Qualified':'At Risk'}</div><div class="sub">${q.qualified?'All current requirements met':'Needs '+q.reasons.join(' • ')}</div></div>
  <div class="card kpi"><div class="label">PPV</div><div class="value">${rep.ppv}</div><div class="sub">Proj ${projected(rep.ppv).toFixed(1)} / Goal ${ppvGoal}</div><div class="pace-per-day">${paceText(rep.ppv,ppvGoal,"PPV")}</div></div>
  <div class="card kpi"><div class="label">AIA Posted</div><div class="value">${rep.aiaPosted}</div><div class="sub">Proj ${projected(rep.aiaPosted).toFixed(1)} / Goal ${state.repGoals.aiaPosted}</div><div class="pace-per-day">${q.aiaEither?paceText(rep.aiaPosted,state.repGoals.aiaPosted,"AIA Posted"):`Qualify first: ${Math.max(0,state.comp.aiaSubmitQual-rep.aiaSubmits)} submits left OR reach ${pct(state.comp.aiaCloseQual)}`}</div></div>

 <div class="section-title">Achievements</div><div class="badges">${(b.length?b:['🎯 Closing Stretch — Earn the Next Badge']).map(x=>`<span class="badge">${x}</span>`).join('')}</div>
 <div class="section-title">What Gets You Paid</div><div class="card"><div class="card-body"><table><thead><tr><th>Metric</th><th class="num">Current</th><th class="num">Goal</th><th class="num">Projected</th><th>Coaching</th></tr></thead><tbody>

 ${metricRow('Upgrades',rep.upgrades,upgGoal,{path:`reps.${i}.upgrades`})}
 ${metricRow('Data',rep.data,state.repGoals.data,{path:`reps.${i}.data`})}
 </tbody></table></div></div>
 <div class="section-title">What Qualifies You</div><div class="card"><div class="card-body"><table><thead><tr><th>Requirement</th><th class="num">Current</th><th class="num">Target</th><th>Result</th></tr></thead><tbody>

 </tbody></table></div></div>

 <div class="grid two" style="margin-top:14px"><div class="callout win"><strong>Shoutouts</strong><ul>${(c.wins.length?c.wins:['Create a standout metric today.']).map(x=>`<li>${x}</li>`).join('')}</ul></div><div class="callout focus"><strong>Today to Win</strong><ul>${(c.focus.length?c.focus:['Stay the course and create separation.']).slice(0,4).map(x=>`<li>${x}</li>`).join('')}</ul></div></div>

function renderComp(){return `<section class="page" id="page-comp"><div class="hero"><h1>Clear Compensation Math</h1><p>Protected by each person’s vault password. Planning estimates, not official payroll.</p></div>${state.reps.map((r,i)=>{const c=repComp(r),q=repQualification(r),max=repComp(r,true);return `<details ${i===0?'open':''}><summary>${escapeHtml(r.name)} — Compensation Math</summary><div class="detail-body">${compVault(i,`<div class="grid four">
 <div class="card kpi"><div class="label">Adjusted Base</div><div class="value">${money2(c.adjusted)}</div></div>
 <div class="card kpi"><div class="label">Final Base</div><div class="value">${money2(c.finalBase)}</div></div>
 <div class="card kpi"><div class="label">PPV Pay</div><div class="value">${money(c.ppvPay)}</div></div>
 <div class="card kpi"><div class="label">AIA Posted Pay</div><div class="value">${money(c.aiaPay)}</div></div></div>
 <p><code class="formula">Projected Units = Current MTD × ${state.meta.daysInMonth} ÷ ${state.meta.daysElapsed}</code></p>
 <p><code class="formula">Adjusted Base = ${money2(state.comp.startingBase)} + (${money2(state.comp.upgradeAdd)} × projected upgrades) + (${money2(state.comp.dataAdd)} × projected data)</code></p>

 <p><code class="formula">Instant Spiffs = projected AIA submits × ${money(state.comp.aiaSubmitSpiff)} + projected Pre→Post × ${money(state.comp.pre2postSpiff)} = ${money2(c.spiffs)}</code></p>
 <p><strong>Projected Total:</strong> ${money2(c.total)} &nbsp;•&nbsp; <strong>Potential with both multipliers:</strong> ${money2(max.total)} &nbsp;•&nbsp; <strong>Upside:</strong> ${money2(max.total-c.total)}</p>`)}
 </div></details>`}).join('')}<div class="callout note"><strong>AIA qualification:</strong> ${state.comp.aiaSubmitQual} submits OR ${pct(state.comp.aiaCloseQual)} close rate. The pay estimate remains visible after unlocking even when qualification is at risk.</div></section>`}

const QUICK_METRICS=[
 ['ppv','PPV',false],
 ['aiaPosted','Posted',false],
 ['aiaSubmits','Submit',false],
 ['aiaClose','AIA Close',true],
 ['htp','HTP',false],
 ['upgrades','Upgrades',false],
 ['data','Data',false],
 ['cru','CRU',false],
 ['accessoryRevenue','Accessory Rev',false],
 ['accPerOpp','Acc Rev / Opp',false],
 ['insurance','Insurance %',true],
 ['nextUp','Next Up %',true],
 ['csat','CSAT',true],
 ['pre2post','Prepaid to Postpaid',false],
];
function parseQuickNumber(raw,isRate=false){
 let s=String(raw??'').trim().replaceAll(',','').replaceAll('$','');
 if(!s||s==='-'||s==='—')return 0;
 const hadPercent=s.includes('%'); s=s.replace('%','');
 let value=Number(s);
 if(!Number.isFinite(value))return 0;
 if(isRate && (hadPercent||value>1))value=value/100;
 return value;
}
function quickLinesFor(obj,includeStoreExtras=false){
 const lines=QUICK_METRICS.map(([key])=>{
   const value=n(obj[key]);
   const isRate=QUICK_METRICS.find(x=>x[0]===key)[2];
   return isRate?(value*100).toFixed(value*100%1?2:0)+'%':String(value);
 });
 if(includeStoreExtras){
   lines.push((n(obj.ppvClose)*100).toFixed(2)+'%');
   lines.push((n(obj.htpClose)*100).toFixed(2)+'%');
   lines.push(String(n(obj.traffic)));
 }
 return lines.join('\n');
}
function applyQuickUpdate(target,index=null){
 const id=target==='store'?'quick-store':`quick-rep-${index}`;
 const lines=document.getElementById(id).value.split(/\r?\n/).map(x=>x.trim()).filter(x=>x.length);
 const required=target==='store'?18:15;
 if(lines.length<required){
   alert(`Please paste ${required} values. I found ${lines.length}.`);
   return;
 }
 const obj=target==='store'?state.store:state.reps[index];
 QUICK_METRICS.forEach(([key,label,isRate],i)=>obj[key]=parseQuickNumber(lines[i],isRate));
 if(target==='store'){
   obj.ppvClose=parseQuickNumber(lines[15],true);
   obj.htpClose=parseQuickNumber(lines[16],true);
   obj.traffic=parseQuickNumber(lines[17],false);
   // Estimate eligible count when a direct HTP close rate was supplied.
   if(obj.htpClose>0)obj.htpEligible=Math.max(obj.htp,Math.round(obj.htp/obj.htpClose));
 }
 state.meta.daysElapsed=Math.max(1,state.meta.daysElapsed);
 localStorage.setItem('storepulse-state-v5',JSON.stringify(state));
 renderAll();
 currentPage='edit';showPage('edit');
 setTimeout(()=>{const msg=document.getElementById(`quick-ok-${target==='store'?'store':index}`);if(msg){msg.classList.add('show');setTimeout(()=>msg.classList.remove('show'),1800)}},50);
}
function quickOrder(includeStoreExtras=false){
 const base=QUICK_METRICS.map((x,i)=>`${i+1}. ${x[1]}`);
 if(includeStoreExtras)base.push('16. PPV Close Rate','17. HTP Close Rate','18. Traffic');
 return base.join(' • ');
}
function renderQuickEditor(title,target,index=null){
 const obj=target==='store'?state.store:state.reps[index];
 const includeStore=target==='store';
 const id=includeStore?'quick-store':`quick-rep-${index}`;
 const okId=includeStore?'quick-ok-store':`quick-ok-${index}`;
 return `<div class="quick-card"><div class="quick-head">${escapeHtml(title)}</div><div class="quick-body">
   <div class="mini">Paste one value per line in this exact order:</div>
   <div class="quick-order">${quickOrder(includeStore)}</div>
   <textarea id="${id}" spellcheck="false">${quickLinesFor(obj,includeStore)}</textarea>
   <div class="quick-actions"><button class="btn dark" onclick="applyQuickUpdate('${target}',${index===null?'null':index})">Apply ${includeStore?'Store':escapeHtml(obj.name)} Update</button><span class="quick-success" id="${okId}">✓ Updated</span></div>
 </div></div>`;
}

function inputField(path,label,value,type='number',step='1',help=''){const id=path.replaceAll('.','__');return `<div class="field"><label for="${id}">${label}</label><input id="${id}" type="${type}" value="${value}" step="${step}" onchange="setPath('${path}',this.type==='checkbox'?this.checked:(this.type==='number'?Number(this.value):this.value))" ${type==='checkbox'&&value?'checked':''}/>${help?`<small>${help}</small>`:''}</div>`}
function labelize(k){return k.replace(/([A-Z])/g,' $1').replace(/^./,x=>x.toUpperCase()).replaceAll('Aia','AIA').replaceAll('Ppv','PPV').replaceAll('Htp','HTP').replaceAll('Cusat','CSAT')}
function isRateKey(k){return ['insurance','csat','aiaClose','tradeRate','nextUp','htpRate','csatQual','insuranceMin','insuranceBonus','aiaCloseQual'].some(x=>k.toLowerCase().includes(x.toLowerCase()))}
function renderEdit(){return `<section class="page" id="page-edit"><div class="hero"><h1>Quick Update</h1><p>Paste the MySuccess numbers in the same order every time, then tap Apply. Advanced goals and settings are below.</p></div>
 <div class="callout note"><strong>Fastest workflow:</strong> paste one value per line. Percentages can be entered as 65.71 or 65.71%. The app converts them automatically.</div>
 <div class="section-title">Store & Rep Quick Update</div>
 <div class="quick-update-grid">${renderQuickEditor('Store','store')}${state.reps.map((r,i)=>renderQuickEditor(r.name,'rep',i)).join('')}</div>
 <details class="advanced-editor"><summary>Advanced Goals, Compensation Rules & Individual Fields</summary><div class="detail-body">
 <div class="edit-section"><h3>Month & Store</h3><div class="form-grid">${inputField('meta.month','Month',state.meta.month,'text')}${inputField('meta.daysInMonth','Days in Month',state.meta.daysInMonth)}${inputField('meta.daysElapsed','Days Elapsed',state.meta.daysElapsed)}${inputField('meta.storeName','Store Name',state.meta.storeName,'text')}${inputField('meta.updatedThrough','Updated Through',state.meta.updatedThrough,'text')}</div></div>
 <div class="edit-section"><h3>Store Goals & Manager Estimate</h3><div class="form-grid">${Object.entries(state.storeGoals).map(([k,v])=>inputField(`storeGoals.${k}`,labelize(k),v)).join('')}</div></div>
 <div class="edit-section"><h3>Individual Goals</h3><div class="form-grid">${Object.entries(state.repGoals).map(([k,v])=>inputField(`repGoals.${k}`,labelize(k),v,'number',isRateKey(k)?'.001':'1')).join('')}</div></div>
 <div class="edit-section"><h3>Comp & Qualification Rules</h3><div class="form-grid">${Object.entries(state.comp).map(([k,v])=>inputField(`comp.${k}`,labelize(k),v,'number',isRateKey(k)?'.001':'.01')).join('')}</div></div>
 <div class="edit-section"><h3>Store Individual Fields</h3><div class="form-grid">${Object.entries(state.store).map(([k,v])=>inputField(`store.${k}`,labelize(k),v,'number',isRateKey(k)?'.0001':'1')).join('')}</div></div>
 ${state.reps.map((r,i)=>`<div class="edit-section card"><div class="card-head">${escapeHtml(r.name)}</div><div class="card-body"><div class="form-grid">${Object.entries(r).filter(([k])=>k!=='color').map(([k,v])=>inputField(`reps.${i}.${k}`,labelize(k),v,typeof v==='boolean'?'checkbox':typeof v==='string'?'text':'number',isRateKey(k)?'.0001':'1')).join('')}</div></div></div>`).join('')}
 </div></details>
 <div class="grid two" style="margin-top:16px"><button class="btn dark" onclick="downloadJSON()">Download JSON Backup</button><button class="btn secondary" onclick="resetState()">Reset Test Data</button></div></section>`}
function setPath(path,value){const parts=path.split('.');let o=state;for(let i=0;i<parts.length-1;i++)o=o[parts[i]];o[parts.at(-1)]=value;saveState()}
function renderAll(){document.getElementById('content').innerHTML=renderStore()+state.reps.map(renderRep).join('');renderTabs();showPage(currentPage)}
function downloadJSON(){downloadBlob(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),`StorePulse_${state.meta.month.replaceAll(' ','_')}.json`)}
function downloadBlob(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1200)}
function exportShareableHTML(){const source=document.documentElement.outerHTML,embedded=`const EMBEDDED_STATE = ${JSON.stringify(state)};`,modified=source.replace('const EMBEDDED_STATE = null;',embedded);downloadBlob(new Blob(['<!DOCTYPE html>\n'+modified],{type:'text/html'}),`StorePulse_${state.meta.month.replaceAll(' ','_')}_Share.html`)}
renderAll();
</script>
